services:
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: hookahguide-meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?задайте MEILI_MASTER_KEY в .env}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hookahguide-api
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      CONTENT_ROOT: /content
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?задайте MEILI_MASTER_KEY в .env}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      # Контент монтируется read-only: правки статей подхватываются
      # без пересборки образа (перезапуск api переиндексирует Meili).
      - ./knowledge:/content/knowledge:ro
      - ./data:/content/data:ro
    depends_on:
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  meili_data:
