services:
  caddy:
    image: caddy:2-alpine
    container_name: hookahguide-caddy
    environment:
      DOMAIN: ${DOMAIN:?задайте DOMAIN в .env (например api.example.ru или localhost)}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # сертификаты TLS (важно сохранять между перезапусками)
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hookahguide-api
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      CONTENT_ROOT: /content
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?задайте MEILI_MASTER_KEY в .env}
      DATABASE_URL: jdbc:postgresql://postgres:5432/hookah
      DB_USER: hookah
      DB_PASSWORD: ${POSTGRES_PASSWORD:?задайте POSTGRES_PASSWORD в .env}
      JWT_SECRET: ${JWT_SECRET:?задайте JWT_SECRET в .env}
    expose:
      - "8080"   # доступен только внутри docker-сети, наружу — через caddy
    # Для локальной отладки можно временно открыть порт напрямую:
    # ports:
    #   - "8080:8080"
    volumes:
      - ./knowledge:/content/knowledge:ro
      - ./data:/content/data:ro
    depends_on:
      - meilisearch
      - postgres
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: hookahguide-meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?задайте MEILI_MASTER_KEY в .env}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hookahguide-postgres
    environment:
      POSTGRES_DB: hookah
      POSTGRES_USER: hookah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?задайте POSTGRES_PASSWORD в .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  meili_data:
  pg_data:
  caddy_data:
  caddy_config:
